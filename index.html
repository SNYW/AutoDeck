<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDeck — NET Architecture Generator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header id="header">
    <h1>&gt; AUTO<span class="accent">DECK</span></h1>
    <p class="subtitle">NET Architecture Generator &mdash; Cyberpunk RED</p>
    <button id="sfx-toggle" class="sfx-toggle" title="Toggle sound effects">&#9835; SFX</button>
</header>

<section id="action-buttons">
    <button id="generate-btn">GENERATE</button>
    <div class="action-sub-row">
        <button id="host-btn" class="session-btn" title="Host a multiplayer session">HOST</button>
        <button id="share-btn" class="hidden" title="Copy shareable link to clipboard">SHARE</button>
    </div>
</section>

<!-- Session panel — shown when hosting or connected as player -->
<section id="session-bar" class="hidden">
    <!-- Shown when hosting — centered panel -->
    <div id="session-host-info" class="hidden">
        <span class="session-label">SESSION</span>
        <span id="session-code" class="session-code"></span>
        <div id="session-status" class="session-status">
            <span class="status-dot"></span>
            <span class="status-text">Waiting for player...</span>
        </div>
        <div class="session-actions">
            <button id="session-copy-link" class="session-btn" title="Copy join link to clipboard">COPY LINK</button>
            <button id="session-end-btn" class="session-btn">END</button>
        </div>
        <div id="session-link-row">
            <span class="session-link-label">Join link:</span>
            <span id="session-link-text" class="session-link-text"></span>
        </div>
    </div>

    <!-- Shown after joined as player -->
    <div id="session-player-info" class="hidden">
        <span class="session-label">CONNECTED</span>
        <span id="session-player-code" class="session-code"></span>
        <button id="session-leave-btn" class="session-btn">LEAVE</button>
    </div>
</section>

<section id="basic-options" class="options-section">
    <button id="basic-toggle" type="button" class="options-toggle open">
        <span class="options-arrow">&#9654;</span> Basic Options
    </button>
    <div id="basic-panel" class="options-panel">
        <div id="interface-rec" class="interface-rec-display"></div>
        <div class="options-row">
            <div class="opt-group">
                <label class="opt-label" for="diff-select">Difficulty</label>
                <select id="diff-select">
                    <option value="basic">Basic</option>
                    <option value="standard" selected>Standard</option>
                    <option value="uncommon">Uncommon</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>
            <div class="opt-group">
                <label class="opt-label" for="floor-override">Floors</label>
                <input id="floor-override" type="number" min="3" max="18" placeholder="3d6" title="Leave blank for random (3d6). Range: 3–18.">
            </div>
            <div class="opt-group">
                <label class="opt-label" for="branch-override">Branches</label>
                <input id="branch-override" type="number" min="0" max="15" placeholder="1d10" title="Leave blank for random (1d10, 7+ = branch). Range: 0–15. Clamped to fit floor count.">
            </div>
            <div class="opt-group">
                <button id="struct-toggle" title="Structured mode — tactical floor placement (passwords as gates, ICE as guards, valuables deep)">STRUCTURED</button>
            </div>
        </div>
    </div>
</section>

<section id="advanced-options" class="options-section">
    <button id="adv-toggle" type="button" class="options-toggle">
        <span class="options-arrow">&#9654;</span> Advanced Options
    </button>
    <div id="adv-panel" class="options-panel collapsed">
        <div class="adv-group">
            <div class="adv-group-header">
                <span class="adv-group-label">Anti-Personnel ICE</span>
                <button class="adv-group-toggle" data-group="ap" type="button">NONE</button>
            </div>
            <div class="adv-items">
                <label class="adv-item"><input type="checkbox" data-filter="Asp" checked><span class="adv-swatch ice-ap"></span>Asp</label>
                <label class="adv-item"><input type="checkbox" data-filter="Giant" checked><span class="adv-swatch ice-ap"></span>Giant</label>
                <label class="adv-item"><input type="checkbox" data-filter="Hellhound" checked><span class="adv-swatch ice-ap"></span>Hellhound</label>
                <label class="adv-item"><input type="checkbox" data-filter="Kraken" checked><span class="adv-swatch ice-ap"></span>Kraken</label>
                <label class="adv-item"><input type="checkbox" data-filter="Liche" checked><span class="adv-swatch ice-ap"></span>Liche</label>
                <label class="adv-item"><input type="checkbox" data-filter="Raven" checked><span class="adv-swatch ice-ap"></span>Raven</label>
                <label class="adv-item"><input type="checkbox" data-filter="Scorpion" checked><span class="adv-swatch ice-ap"></span>Scorpion</label>
                <label class="adv-item"><input type="checkbox" data-filter="Skunk" checked><span class="adv-swatch ice-ap"></span>Skunk</label>
                <label class="adv-item"><input type="checkbox" data-filter="Wisp" checked><span class="adv-swatch ice-ap"></span>Wisp</label>
            </div>
        </div>
        <div class="adv-group">
            <div class="adv-group-header">
                <span class="adv-group-label">Anti-Program ICE</span>
                <button class="adv-group-toggle" data-group="prog" type="button">NONE</button>
            </div>
            <div class="adv-items">
                <label class="adv-item"><input type="checkbox" data-filter="Dragon" checked><span class="adv-swatch ice-prog"></span>Dragon</label>
                <label class="adv-item"><input type="checkbox" data-filter="Killer" checked><span class="adv-swatch ice-prog"></span>Killer</label>
                <label class="adv-item"><input type="checkbox" data-filter="Sabertooth" checked><span class="adv-swatch ice-prog"></span>Sabertooth</label>
            </div>
        </div>
        <div class="adv-group">
            <div class="adv-group-header">
                <span class="adv-group-label">Content Types</span>
                <button class="adv-group-toggle" data-group="content" type="button">NONE</button>
            </div>
            <div class="adv-items">
                <label class="adv-item"><input type="checkbox" data-filter="password" checked><span class="adv-swatch ct-password"></span>Password</label>
                <label class="adv-item"><input type="checkbox" data-filter="file" checked><span class="adv-swatch ct-file"></span>File</label>
                <label class="adv-item"><input type="checkbox" data-filter="control_node" checked><span class="adv-swatch ct-control"></span>Control Node</label>
                <label class="adv-item"><input type="checkbox" data-filter="empty" checked><span class="adv-swatch ct-empty"></span>Empty</label>
            </div>
        </div>
    </div>
</section>

<main id="main">
    <div id="arch-scroll">
        <button id="compact-toggle" class="compact-toggle" title="Toggle compact/detailed card view">COMPACT</button>
        <div id="arch-container"></div>
    </div>

    <aside id="detail-panel">
        <div class="detail-top">
            <span class="detail-title">Floor Details</span>
            <button id="detail-close">&times;</button>
        </div>
        <div id="detail-body"></div>
    </aside>
</main>

<!-- Action Log — visible in multiplayer (outside #main to avoid flex conflicts) -->
<aside id="action-log" class="hidden">
    <div class="log-header">
        <span class="log-title">Action Log</span>
        <button id="log-toggle-btn" class="log-collapse-btn" title="Collapse log">&#9660;</button>
    </div>
    <div id="log-entries"></div>
</aside>

<!-- Player action bar — fixed bottom, visible in player mode -->
<div id="player-bar" class="hidden">
    <div class="player-bar-inner">
        <span id="player-pos-label" class="player-pos-label">Floor 1</span>
        <div class="player-actions">
            <button id="move-btn" class="player-action" title="Move to an adjacent floor">MOVE</button>
            <button id="jackout-btn" class="player-action jackout" title="Jack out of the NET">JACK OUT</button>
        </div>
    </div>
</div>

<!-- Branch selection modal -->
<div id="branch-modal" class="hidden">
    <div class="branch-modal-inner">
        <div class="branch-modal-title">Choose Path</div>
        <div id="branch-options"></div>
        <button id="branch-cancel-btn" class="session-btn">CANCEL</button>
    </div>
</div>

<!-- Firebase SDK (compat builds for IIFE usage) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script src="js/tables.js"></script>
<script src="js/generator.js"></script>
<script src="js/sfx.js"></script>
<script src="js/renderer.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/session.js"></script>
<script src="js/game-state.js"></script>
<script src="js/main.js"></script>
</body>
</html>
